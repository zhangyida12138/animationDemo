<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext · 面条拖拽进阶</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: #111827;
    }

    header h1 { font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; }
    header p { font-size: 0.82rem; opacity: 0.65; max-width: 72ch; line-height: 1.55; }
    header a { color: #7dd3fc; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.25rem 1.25rem;
      gap: 0.75rem;
      min-height: 0;
    }

    .hint { font-size: 0.78rem; opacity: 0.6; line-height: 1.5; }

    .stage-wrap {
      flex: 1;
      position: relative;
      min-height: 320px;
      border-radius: 12px;
      overflow: hidden;
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas.dragging { cursor: grabbing; }

    .stats {
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <header>
    <h1>面条拖拽 · 进阶</h1>
    <p>
      <a href="./index.html">← 返回</a> ·
      <a href="./noodle-drag.html">基础版</a> ·
      点击<strong>某一行</strong>仅该行变软；其余保持刚性横排。行间 S 形相连：1↔2 尾尾、2↔3 头头、3↔4 尾尾……
    </p>
  </header>

  <main>
    <p class="hint">
      点击任意一行文字，该行变软可甩动；未点行保持横排。第一行头部固定不动。变软行与相邻行按 S 形（尾尾 / 头头交替）连接，字与字之间有碰撞。
    </p>

    <div class="stats" id="stats">行数 — · 面条行 — · 帧 —</div>

    <div class="stage-wrap" id="stage">
      <canvas id="canvas"></canvas>
    </div>
  </main>

  <script type="importmap">
  {
    "imports": {
      "@chenglou/pretext": "https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.8/dist/layout.js"
    }
  }
  </script>
  <script type="module" src="./noodle-drag-advanced.js"></script>
</body>
</html>
